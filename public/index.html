<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Task Manager</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main id="app"></main>
    <template id="auth-template">
      <section class="auth-shell">
        <div class="auth-card">
          <div class="auth-title">
            <p class="eyebrow">Team Task Manager</p>
            <h1 id="auth-heading">Login</h1>
          </div>
          <div class="tabs" role="tablist">
            <button class="tab active" data-auth-tab="login" type="button">Login</button>
            <button class="tab" data-auth-tab="signup" type="button">Signup</button>
          </div>
          <form id="auth-form" class="stack">
            <div id="name-field" class="field hidden">
              <label for="name">Name</label>
              <input id="name" name="name" autocomplete="name" />
            </div>
            <div class="field">
              <label for="email">Email</label>
              <input id="email" name="email" type="email" autocomplete="email" required />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input id="password" name="password" type="password" autocomplete="current-password" required />
            </div>
            <div id="role-field" class="field hidden">
              <label for="role">Role</label>
              <select id="role" name="role">
                <option value="member">Member</option>
                <option value="admin">Admin</option>
              </select>
            </div>
            <button class="primary" type="submit">Continue</button>
            <p id="auth-message" class="message"></p>
          </form>
        </div>
      </section>
    </template>
    <template id="app-template">
      <section class="app-shell">
        <aside class="sidebar">
          <div>
            <p class="eyebrow">Workspace</p>
            <h2>Team Task Manager</h2>
          </div>
          <nav>
            <button class="nav active" data-view="dashboard" type="button">Dashboard</button>
            <button class="nav" data-view="projects" type="button">Projects</button>
          </nav>
          <div class="user-box">
            <strong id="current-user"></strong>
            <span id="current-role"></span>
            <button id="logout" class="ghost" type="button">Logout</button>
          </div>
        </aside>
        <section class="content">
          <header class="topbar">
            <div>
              <p class="eyebrow" id="view-kicker">Dashboard</p>
              <h1 id="view-title">Overview</h1>
            </div>
            <button id="refresh" class="ghost" type="button">Refresh</button>
          </header>
          <div id="notice" class="notice hidden"></div>
          <div id="view"></div>
        </section>
      </section>
    </template>
    <script src="/app.js"></script>
  </body>
</html>
